name: Daily Network Views

on:
  schedule:
    - cron: "30 12 * * *"  # Runs daily at 12:30 UTC (after main update)
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill historical data from 2022-01-01"
        required: false
        type: boolean
        default: false

jobs:
  daily-views:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Google API Tokens
        run: |
          mkdir -p tokens
          echo "${{ secrets.TOKEN_UC2OZVS4PG2K3UFLW6_0AYCQ }}" | base64 --decode > tokens/token_UC2ozVs4pg2K3uFLw6-0ayCQ.pickle
          echo "${{ secrets.TOKEN_UCA9W_CPWWBDLWWBWHOD1YWOG }}" | base64 --decode > tokens/token_UCa9W_cPwwbDlwBwHOd1YWoQ.pickle
          echo "${{ secrets.TOKEN_UC9QY3SHRR5WIL_RKYCMCNCW }}" | base64 --decode > tokens/token_UC9QY3sHrr5wil-rkYcmcNcw.pickle
          echo "${{ secrets.TOKEN_UCFPOJND0D4K1H9A6UOLIKCG }}" | base64 --decode > tokens/token_UCFPoJNd0d4k1H9A6UOlikcg.pickle
          echo "${{ secrets.TOKEN_UCBX_QX_HX5QTUEL72YVYN_A }}" | base64 --decode > tokens/token_UCBX_Qx_Hx5QTuEL72YVYN_A.pickle
          echo "${{ secrets.TOKEN_UCF5FCEEALUCA53OUW3MC8TIQ }}" | base64 --decode > tokens/token_UCf5fcEEALUCA53oUW3mc8tiQ.pickle
          echo "${{ secrets.TOKEN_UCEZHE_0COHQEL1LGFa2EMQW }}" | base64 --decode > tokens/token_UCEZHE-0CoHqeL1LGFa2EmQw.pickle
          echo "${{ secrets.TOKEN_UCBWGKD8_FBXUN7ZGZFC5KJG }}" | base64 --decode > tokens/token_UCbwGkD8-Fbxun7zgzfC5kjg.pickle
          echo "${{ secrets.TOKEN_UCCZ6IVDTPU5G4PN3MAIBRUW }}" | base64 --decode > tokens/token_UCcZ6iVdTPU5g4pN3MaIbruw.pickle

      - name: Fetch daily views
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          if [ "${{ inputs.backfill }}" = "true" ]; then
            python daily_views.py --backfill
          else
            python daily_views.py
          fi

      - name: Commit updated daily-views.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add public/daily-views.json
          git commit -m "Update daily network views" || echo "No changes to commit"
          git push
